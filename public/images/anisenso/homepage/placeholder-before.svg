<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="dryField" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D7CCC8"/>
      <stop offset="100%" style="stop-color:#A1887F"/>
    </linearGradient>
  </defs>
  <!-- Background - dry/unhealthy field -->
  <rect width="600" height="400" fill="url(#dryField)"/>
  <!-- Sparse, wilted plants -->
  <g fill="#8D6E63" opacity="0.7">
    <path d="M100 400 Q100 350 95 300 Q90 280 100 260"/>
    <path d="M250 400 Q250 360 245 320 Q240 300 250 280"/>
    <path d="M400 400 Q400 355 395 310 Q390 290 400 270"/>
    <path d="M500 400 Q500 365 495 330 Q490 310 500 290"/>
  </g>
  <!-- "BEFORE" label -->
  <rect x="20" y="20" width="100" height="36" fill="#EF5350" rx="4"/>
  <text x="70" y="45" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">BEFORE</text>
</svg>