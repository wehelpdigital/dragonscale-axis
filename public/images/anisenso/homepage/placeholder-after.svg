<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="greenField" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81C784"/>
      <stop offset="100%" style="stop-color:#4CAF50"/>
    </linearGradient>
  </defs>
  <!-- Background - healthy green field -->
  <rect width="600" height="400" fill="url(#greenField)"/>
  <!-- Dense, healthy plants -->
  <g fill="#2E7D32">
    <path d="M50 400 Q50 300 60 220 Q65 180 50 140"/>
    <path d="M100 400 Q100 310 110 230 Q115 190 100 150"/>
    <path d="M150 400 Q150 320 160 250 Q165 210 150 170"/>
    <path d="M200 400 Q200 305 210 225 Q215 185 200 145"/>
    <path d="M250 400 Q250 315 260 240 Q265 200 250 160"/>
    <path d="M300 400 Q300 300 310 220 Q315 180 300 140"/>
    <path d="M350 400 Q350 310 360 235 Q365 195 350 155"/>
    <path d="M400 400 Q400 305 410 225 Q415 185 400 145"/>
    <path d="M450 400 Q450 315 460 240 Q465 200 450 160"/>
    <path d="M500 400 Q500 300 510 220 Q515 180 500 140"/>
    <path d="M550 400 Q550 310 560 235 Q565 195 550 155"/>
  </g>
  <!-- Rice grains on stalks -->
  <g fill="#C5E1A5" opacity="0.8">
    <ellipse cx="50" cy="140" rx="8" ry="20"/>
    <ellipse cx="100" cy="150" rx="8" ry="20"/>
    <ellipse cx="200" cy="145" rx="8" ry="20"/>
    <ellipse cx="300" cy="140" rx="8" ry="20"/>
    <ellipse cx="400" cy="145" rx="8" ry="20"/>
    <ellipse cx="500" cy="140" rx="8" ry="20"/>
  </g>
  <!-- "AFTER" label -->
  <rect x="20" y="20" width="100" height="36" fill="#4CAF50" rx="4"/>
  <text x="70" y="45" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">AFTER</text>
</svg>