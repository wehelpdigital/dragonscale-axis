<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="farmerBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81C784"/>
      <stop offset="100%" style="stop-color:#4CAF50"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#farmerBg)"/>
  <!-- Farmer silhouette -->
  <g fill="#2E7D32">
    <!-- Hat -->
    <ellipse cx="200" cy="100" rx="80" ry="20"/>
    <ellipse cx="200" cy="95" rx="50" ry="30"/>
    <!-- Head -->
    <circle cx="200" cy="140" r="40" fill="#D7CCC8"/>
    <!-- Body -->
    <path d="M140 180 Q120 250 130 320 L150 400 L250 400 L270 320 Q280 250 260 180 Q230 160 200 160 Q170 160 140 180" fill="#5D4037"/>
    <!-- Arms -->
    <path d="M140 200 Q100 220 80 280 L100 290 Q115 240 150 220" fill="#D7CCC8"/>
    <path d="M260 200 Q300 220 320 280 L300 290 Q285 240 250 220" fill="#D7CCC8"/>
  </g>
  <!-- Rice plant in hand -->
  <g fill="#8BC34A">
    <path d="M310 280 Q320 220 310 160"/>
    <ellipse cx="310" cy="160" rx="10" ry="25"/>
    <ellipse cx="295" cy="180" rx="8" ry="20"/>
    <ellipse cx="325" cy="185" rx="8" ry="18"/>
  </g>
</svg>