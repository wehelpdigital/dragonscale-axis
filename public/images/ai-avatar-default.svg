<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#556ee6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34c38f;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGradient)"/>
  <!-- Robot head outline -->
  <rect x="50" y="45" width="100" height="90" rx="15" fill="#ffffff"/>
  <!-- Eyes -->
  <circle cx="75" cy="85" r="12" fill="#556ee6"/>
  <circle cx="125" cy="85" r="12" fill="#556ee6"/>
  <circle cx="78" cy="82" r="4" fill="#ffffff"/>
  <circle cx="128" cy="82" r="4" fill="#ffffff"/>
  <!-- Mouth/Speaker -->
  <rect x="70" y="110" width="60" height="10" rx="5" fill="#556ee6"/>
  <!-- Antenna -->
  <rect x="95" y="25" width="10" height="25" rx="5" fill="#ffffff"/>
  <circle cx="100" cy="22" r="8" fill="#34c38f"/>
  <!-- Ears/Side panels -->
  <rect x="38" y="70" width="12" height="35" rx="4" fill="#34c38f"/>
  <rect x="150" y="70" width="12" height="35" rx="4" fill="#34c38f"/>
</svg>